<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tatia Ningrum</title>
    <style>
        /* Menghilangkan margin default agar tampilan penuh */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
        }

        /* Container utama agar desain Canva proporsional */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .canva-embed-wrapper {
            position: relative; 
            width: 100%; 
            height: 0; 
            padding-top: 141%; /* Menyesuaikan proporsi standar dokumen/website */
            box-shadow: 0 4px 12px 0 rgba(0,0,0,0.1); 
            border-radius: 12px; 
            overflow: hidden;
            background: #fff;
        }

        iframe {
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 0; 
            left: 0; 
            border: none;
        }

        .footer-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .footer-link a {
            color: #0077b5; /* Warna biru LinkedIn */
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Bagian Desain Canva Kamu -->
        <div class="canva-embed-wrapper">
            <iframe loading="lazy" 
                src="https://www.canva.com/design/DAHHrqMDzXw/mvzAVqW6-8bM0fCt6isybg/view?embed" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>

        <!-- Link Atribusi -->
        <div class="footer-link">
            <p>Portfolio oleh <a href="https://www.canva.com/design/DAHHrqMDzXw/mvzAVqW6-8bM0fCt6isybg/view" target="_blank" rel="noopener">Tatia Ningrum</a></p>
        </div>
    </div>

</body>
</html>
