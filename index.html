<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tatia Ningrum</title>
    <style>
        /* Menghilangkan margin dan scroll ganda agar tampilan bersih */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* Container utama yang mengikuti tinggi layar (Responsive) */
        .portfolio-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Menggunakan tinggi layar penuh */
        }

        /* Iframe dibuat memenuhi layar agar area klik presisi */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="portfolio-container">
        <!-- Embed Link Canva Tatia Ningrum -->
        <iframe 
            loading="lazy" 
            src="https://www.canva.com/design/DAHHrqMDzXw/mvzAVqW6-8bM0fCt6isybg/view?embed" 
            allowfullscreen="allowfullscreen" 
            allow="fullscreen">
        </iframe>
    </div>

</body>
</html>
