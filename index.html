<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tatia Ningrum</title>
    <style>
        /* Mengatur tampilan dasar agar bersih */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Container utama yang membungkus Canva */
        .portfolio-container {
            flex: 1;
            position: relative;
            width: 100%;
            /* Menghilangkan padding raksasa agar tidak kepanjangan */
            min-height: 100vh; 
        }

        /* Pengaturan Iframe agar full screen dan rapi */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            padding: 0;
            margin: 0;
        }

        /* Footer tipis untuk link sumber */
        .footer {
            padding: 10px;
            text-align: center;
            font-family: sans-serif;
            font-size: 12px;
            background: #f8f9fa;
            color: #555;
        }

        .footer a {
            color: #0077b5;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="portfolio-container">
        <iframe 
            loading="lazy" 
            src="https://www.canva.com/design/DAHHrqMDzXw/mvzAVqW6-8bM0fCt6isybg/view?embed" 
            allowfullscreen="allowfullscreen" 
            allow="fullscreen">
        </iframe>
    </div>

    <div class="footer">
        <a href="https://www.canva.com/design/DAHHrqMDzXw/mvzAVqW6-8bM0fCt6isybg/view" target="_blank" rel="noopener">
            Portofolio Tatia Ningrum
        </a>
    </div>

</body>
</html>
